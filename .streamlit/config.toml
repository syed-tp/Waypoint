[theme]
base = "light"
primaryColor = "#6366f1"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#ffffff"
textColor = "#111827"
borderColor = "#e5e7eb"

# Typography
font = "'Space Grotesk':https://fonts.googleapis.com/css2?family=Space+Grotesk&display=swap"
